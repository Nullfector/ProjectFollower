<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <title>Logowanie do serwisu</title>
</head>
<body>
  <div class="login-wrap">
  <h1>ProjectFollower</h1>

  <div class="login-box">
  <form id="loginForm">
    <label>
      Login:
      <input name="login" autocomplete="username" required>
    </label>
    <br>
    <label>
      Hasło:
      <input name="haslo" type="password" autocomplete="current-password" required>
    </label>
    <br>
    <button type="submit">Zaloguj</button>
  </form>
  </div>

  <p id="msg" style="color:red;"></p>
</div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {

      const form = document.getElementById('loginForm');
      const msg = document.getElementById('msg');

      if (!form) {
        return;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();


        msg.textContent = '';

        const fd = new FormData(form);

        let res;
        try {
          res = await fetch('api/login.php', {
            method: 'POST',
            body: fd,
            credentials: 'include'
          });
        } catch (err) {
          msg.textContent = 'Błąd połączenia z serwerem.';
          return;
        }

        const text = await res.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch (err) {
          msg.textContent = 'Serwer nie zwrócił JSON. Sprawdź console (raw response).';
          return;
        }

        if (data.ok) {
          window.location.href = data.redirect || 'me.php';
        } else {
          msg.textContent = data.error || 'Nieprawidłowe logowanie.';
          form.reset();
        }
      });
    });
  </script>

  <style>
    body{
    background-color: #f5eee6;
    font-family: Arial, Helvetica, sans-serif;
    color: #333;
}


.login-wrap{
    max-width: 420px;
    margin: 80px auto;
}


.login-wrap h1{
    text-align: center;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 2px solid #cfcfcf;
}


.login-box{
    background-color: #f2f2f2;
    border: 1px solid #bbb;
    border-radius: 8px;
    padding: 18px 20px;
}


.login-box label{
    display: block;
    margin-bottom: 12px;
    font-weight: 600;
}

.login-box input{
    width: 100%;
    padding: 8px 0px;
    margin-top: 4px;
    border: 3px solid #aaa;
    border-radius: 6px;
    font-size: 14px;
}


.login-box button{
    margin-top: 14px;
    padding: 10px;
    width: 100%;
    font-size: 15px;
    font-weight: 700;
    border-radius: 6px;
    border: 1px solid #999;
    background: #e0e0e0;
    cursor: pointer;
}

.login-box button:hover{
    filter: brightness(0.97);
}


#msg{
    margin-top: 12px;
    text-align: center;
    font-weight: 600;
}
  </style>
</body>
</html>
