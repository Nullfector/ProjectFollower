services:
  db:
    image: postgres:16
    container_name: projectfollower-db
    environment:
      POSTGRES_DB: projectfollower
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # init skrypty odpalają się tylko przy pierwszym tworzeniu wolumenu (pierwszym starcie "na czysto")
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: projectfollower-web
    depends_on:
      - db
    ports:
      - "8080:80"
    volumes:
      # mount całego projektu do kontenera
      - ./:/var/www/app
    environment:
      # opcjonalnie: możesz sobie użyć tego w kodzie
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: projectfollower
      DB_USER: postgres
      DB_PASS: postgres

volumes:
  db_data: